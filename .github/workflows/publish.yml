name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet test tests/VibeCoderToolkit.Documents.Tests/VibeCoderToolkit.Documents.Tests.csproj -c Release

      - run: dotnet pack src/VibeCoderToolkit.Documents/VibeCoderToolkit.Documents.csproj -c Release -o ./nupkg

      - name: Push to NuGet
        env:
          KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in ./nupkg/*.nupkg; do
            echo "Pushing $(basename $pkg)..."
            STATUS=*** -s -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "X-NuGet-ApiKey: *** \
              --data-binary "@$pkg" \
              "https://www.nuget.org/api/v2/package/")
            echo "HTTP $STATUS"
            if [ "$STATUS" != "201" ] && [ "$STATUS" != "409" ]; then
              echo "FAILED"
              exit 1
            fi
          done
